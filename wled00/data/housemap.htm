<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
<title>WLED House Layout</title>
<link rel="stylesheet" href="style.css">
<style>
body{max-width:1280px;margin:0 auto;padding:10px;background:#111;color:#fff}
.hm-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:8px 0 12px}
.hm-title{font-size:24px;font-weight:700}
.hm-actions,.hm-tools,.hm-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hm-grid{display:grid;grid-template-columns:190px minmax(320px,1fr) 300px;gap:10px}
.hm-panel{background:#222;border:1px solid #555;border-radius:6px;padding:10px}
.hm-panel h2{font-size:15px;margin:0 0 10px;color:#ddd}
.hm-stage{position:relative;min-height:62vh;background:#080b0f;border:1px solid #555;border-radius:6px;overflow:hidden;touch-action:none}
.hm-stage.empty{display:grid;place-items:center}
.hm-canvas{position:absolute;transform-origin:0 0}
.hm-stage img{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;pointer-events:none;user-select:none;-webkit-user-drag:none}
.hm-wire{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.hm-wire line{stroke:rgba(255,255,255,.42);stroke-width:1.4;vector-effect:non-scaling-stroke}
#canvas .hm-pixel{position:absolute;display:block;box-sizing:border-box;appearance:none;-webkit-appearance:none;padding:0;min-width:0;max-width:none;width:calc(14px / var(--z,1));height:calc(14px / var(--z,1));margin:calc(-7px / var(--z,1)) 0 0 calc(-7px / var(--z,1));border:0;background:transparent;box-shadow:none;font-size:0;line-height:0;overflow:visible;cursor:crosshair}
#canvas .hm-pixel:before{content:"";position:absolute;left:50%;top:50%;box-sizing:border-box;width:calc(4px / var(--z,1));height:calc(4px / var(--z,1));transform:translate(-50%,-50%);border-radius:50%;border:calc(.75px / var(--z,1)) solid #fff;background:var(--c,#ffd166);box-shadow:0 0 calc(1.25px / var(--z,1)) var(--c,#ffd166)}
.hm-preview{pointer-events:none}
#canvas .hm-preview .hm-pixel{opacity:.75}
#canvas .hm-preview .hm-pixel:before{background:#60d9ff;box-shadow:0 0 calc(1.25px / var(--z,1)) #60d9ff}
#canvas .hm-pixel.sel:after{content:"";position:absolute;left:50%;top:50%;box-sizing:border-box;width:calc(9px / var(--z,1));height:calc(9px / var(--z,1));transform:translate(-50%,-50%);border-radius:50%;border:calc(1px / var(--z,1)) solid #60d9ff}
.hm-tool{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;margin:0 0 8px}
.hm-tool.active{background:#0d6d82}
.hm-stack{display:grid;gap:8px}
.hm-field{display:grid;gap:4px}
.hm-field label{font-size:12px;color:#bbb}
.hm-field input,.hm-field select{width:100%;box-sizing:border-box}
.hm-menu{position:fixed;z-index:10;background:#f7f7f7;color:#111;border-radius:6px;padding:5px;box-shadow:0 18px 45px #0009}
.hm-menu button{display:block;width:150px;margin:0;background:transparent;color:#111;text-align:left;border:0}
.hm-menu button:hover{background:#ddd}
.hm-count{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:#050608;border:1px solid #444;border-radius:5px;padding:10px;margin-bottom:12px}
.hm-count strong{font-size:24px}
.hm-count span{font-size:12px;color:#bbb}
.hm-count.ok strong{color:#72f0a1}
.hm-count.warn strong{color:#ffd166}
.hm-count.over strong{color:#ff6b6b}
.hm-output-count{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;border-top:1px solid #333;padding:7px 0;font-size:13px}
.hm-output-count:first-child{border-top:0}
.hm-output-count b{font-weight:600}
.hm-output-count span{color:#bbb}
.hm-output-count.ok span{color:#72f0a1}
.hm-output-count.over span{color:#ff6b6b}
.hm-seg{display:grid;grid-template-columns:1fr 54px 54px;gap:5px;align-items:center;margin-bottom:6px;padding:6px;border-radius:6px;cursor:pointer}
.hm-seg:hover,.hm-seg.active{background:#333}
.hm-seg.active{outline:1px solid #777}
.hm-seg span{font-size:12px;color:#bbb;text-align:right}
.hm-note{font-size:12px;color:#bbb;line-height:1.45}
.hm-hidden{display:none}
@media(max-width:900px){.hm-grid{grid-template-columns:1fr}.hm-stage{min-height:52vh}.hm-tools{display:grid;grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="hm-top">
	<div class="hm-title">WLED House Layout</div>
	<div class="hm-actions">
		<button class="btn" onclick="location.href=getURL('/')">WLED</button>
		<button class="btn" onclick="saveLayout()">Save</button>
		<button class="btn" onclick="loadLayout()">Load</button>
		<button class="btn" onclick="applySegments()">Apply segments</button>
	</div>
</div>
<div class="hm-grid">
	<div class="hm-panel">
		<h2>Tools</h2>
		<div class="hm-tools">
			<button id="tool-point" class="btn hm-tool active" onclick="setTool('point')">Single light</button>
			<button id="tool-line" class="btn hm-tool" onclick="setTool('line')">Light string</button>
			<button id="tool-select" class="btn hm-tool" onclick="setTool('select')">Select</button>
			<button class="btn hm-tool" onclick="deleteSelected()">Delete</button>
		</div>
		<div class="hm-stack">
			<div class="hm-row">
				<button class="btn" onclick="resetView()">Reset view</button>
			</div>
			<div class="hm-field">
				<label>House photo</label>
				<input id="photo" type="file" accept="image/*" onchange="uploadPhoto(this.files[0])">
			</div>
			<div class="hm-field">
				<label>Output being mapped</label>
				<select id="outputSel" onchange="setOutput(this.value)"></select>
			</div>
			<div class="hm-field">
				<label>Line pixel count</label>
				<input id="lineCount" type="number" min="1" max="1000" value="25">
			</div>
			<div class="hm-field">
				<label>Segment name</label>
				<input id="segName" value="House segment">
			</div>
			<button class="btn" onclick="makeSegment()">Segment selected</button>
			<p class="hm-note">Single light places one physical LED at a time. Light string places an evenly spaced run. Right click or long press lights to segment them.</p>
		</div>
	</div>
	<div id="stage" class="hm-stage empty" onpointerdown="pointerDown(event)" onpointermove="pointerMove(event)" onpointerup="pointerUp(event)" onpointercancel="pointerUp(event)" oncontextmenu="event.preventDefault()">
		<div id="empty">Upload a house photo to start mapping.</div>
		<div id="canvas" class="hm-canvas">
		<img id="bg" class="hm-hidden" alt="" draggable="false">
			<svg id="wires" class="hm-wire"></svg>
			<div id="pixels"></div>
			<div id="linePreview" class="hm-preview"></div>
		</div>
	</div>
	<div class="hm-panel">
		<h2>Pixel Count</h2>
		<div id="countBox" class="hm-count">
			<span>Mapped / available</span>
			<strong id="pixelCount">0 / ?</strong>
			<div id="outputCounts" style="grid-column:1/-1"></div>
		</div>
		<h2>Segments</h2>
		<button class="btn" onclick="deleteSegment()">Delete segment</button>
		<div id="segments"></div>
		<p id="msg" class="hm-note"></p>
	</div>
</div>
<div id="menu" class="hm-menu hm-hidden">
	<button onclick="makeSegment()">Create segment</button>
	<button onclick="selectRun()">Select same run</button>
	<button onclick="setRunStart()">Set start number</button>
	<button onclick="reverseRun()">Reverse line direction</button>
	<button onclick="deleteSelected()">Delete selected</button>
</div>
<script src="common.js"></script>
<script>
let tool="point", pixels=[], segments=[], selected=[], activeSegment=null, drag=null, panDrag=null, lineStart=null, lineEnd=null, menuPixel=null, pressTimer=null, info={leds:{count:0,maxseg:32}}, cfg=null, outputs=[], currentOutput=0, zoom=1, panX=0, panY=0, pic={x:0,y:0,w:1,h:1}, touches=new Map(), pinch=null, liveColors=[], liveOn=false, liveTimer=null;
const stage=gId("stage"), canvas=gId("canvas"), bg=gId("bg"), pxWrap=gId("pixels"), preview=gId("linePreview"), wires=gId("wires"), msg=gId("msg");
function setTool(t){tool=t;["point","line","select"].forEach(x=>gId("tool-"+x).classList.toggle("active",x==t));}
function updatePictureRect(){let r=stage.getBoundingClientRect(),nw=bg.naturalWidth||0,nh=bg.naturalHeight||0;if(nw&&nh&&!bg.classList.contains("hm-hidden")){let s=Math.min(r.width/nw,r.height/nh);pic={w:nw*s,h:nh*s};pic.x=(r.width-pic.w)/2;pic.y=(r.height-pic.h)/2}else pic={x:0,y:0,w:r.width,h:r.height};canvas.style.left=pic.x+"px";canvas.style.top=pic.y+"px";canvas.style.width=pic.w+"px";canvas.style.height=pic.h+"px";applyView()}
function applyView(){canvas.style.setProperty("--z",zoom);canvas.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`}
function setZoom(v,cx,cy){let old=zoom,r=stage.getBoundingClientRect();cx=cx??(pic.x+pic.w/2);cy=cy??(pic.y+pic.h/2);zoom=Math.max(1,Math.min(6,parseFloat(v)/100));let lx=(cx-pic.x-panX)/old,ly=(cy-pic.y-panY)/old;panX=cx-pic.x-lx*zoom;panY=cy-pic.y-ly*zoom;applyView()}
function resetView(){zoom=1;panX=0;panY=0;applyView()}
function pt(e){let r=stage.getBoundingClientRect(),x=(e.clientX-r.left-pic.x-panX)/zoom,y=(e.clientY-r.top-pic.y-panY)/zoom;return{x:Math.max(0,Math.min(100,x/pic.w*100)),y:Math.max(0,Math.min(100,y/pic.h*100))};}
function rgb(hex){hex=hex.replace("#","");return[0,2,4].map(i=>parseInt(hex.slice(i,i+2),16));}
function liveColor(id,fallback="#ffd166"){return liveColors[id]||fallback}
function applyLiveColors(){pixels.forEach(p=>{let el=document.querySelector(`#pixels .hm-pixel[data-id="${p.id}"]`);if(el)el.style.setProperty("--c",liveColor(p.id,p.color||"#ffd166"))});document.querySelectorAll("#wires line[data-to]").forEach(l=>l.setAttribute("stroke",liveColor(l.dataset.to,"rgba(255,255,255,.42)")))}
function handleLiveJson(leds){if(!liveOn||!Array.isArray(leds))return;liveColors=leds.map(c=>"#"+((c.length>6)?c.substring(2):c));applyLiveColors()}
function pollLive(retry=0){clearTimeout(liveTimer);if(!liveOn)return;fetch(getURL("/json/live")).then(r=>r.ok?r.json():Promise.reject()).then(j=>{handleLiveJson(j.leds);liveTimer=setTimeout(pollLive,80)}).catch(()=>{if(liveOn)liveTimer=setTimeout(()=>pollLive(retry+1),retry<5?1000:2500)})}
function setLive(on){liveOn=on;clearTimeout(liveTimer);if(on)pollLive()}
function setOutput(v){currentOutput=parseInt(v,10)||0;drawCount()}
function buildOutputs(){let ins=cfg&&cfg.hw&&cfg.hw.led&&cfg.hw.led.ins;if(Array.isArray(ins)&&ins.length)outputs=ins.map((o,i)=>({id:i,name:"Output "+(i+1),start:o.start||0,len:o.len||0,pin:Array.isArray(o.pin)?o.pin.join(","):o.pin}));else outputs=[{id:0,name:"Output 1",start:0,len:(info.leds&&info.leds.count)||0}];let s=gId("outputSel");s.innerHTML=outputs.map(o=>`<option value="${o.id}">${o.name}${o.pin!=null?" - pin "+o.pin:""} (${o.len||"?"})</option>`).join("");s.value=currentOutput}
function nextId(){return pixels.length?Math.max(...pixels.map(p=>p.id))+1:0}
function renumberPixels(){pixels.sort((a,b)=>a.id-b.id).forEach((p,i)=>p.id=i);segments=[];activeSegment=null}
function idsForRun(id){let p=pixels.find(x=>x.id==id);return p&&p.run&&p.run.startsWith("run-")?pixels.filter(x=>x.run==p.run).map(x=>x.id):[id]}
function orderedIdsFrom(id){let ids=idsForRun(id).sort((a,b)=>a-b),at=ids.indexOf(id);if(at==ids.length-1)return ids.reverse();return at>0?ids.slice(at).concat(ids.slice(0,at)):ids}
function reorderIds(groupIds,start){let group=groupIds.map(id=>pixels.find(p=>p.id==id)).filter(Boolean),rest=pixels.filter(p=>!groupIds.includes(p.id)).sort((a,b)=>a.id-b.id);start=Math.max(0,Math.min(start,rest.length));pixels=rest.slice(0,start).concat(group,rest.slice(start));pixels.forEach((p,i)=>p.id=i);selected=group.map(p=>p.id);segments=[];activeSegment=null}
function linePoints(a,b){let n=Math.max(1,parseInt(gId("lineCount").value)||1),out=[];if(n==1)return[{x:a.x,y:a.y}];for(let i=0;i<n;i++){let f=i/(n-1);out.push({x:a.x+(b.x-a.x)*f,y:a.y+(b.y-a.y)*f})}return out}
function clearPreview(){preview.innerHTML="";lineEnd=null}
function drawPreview(){if(!lineStart||!lineEnd)return;preview.innerHTML=linePoints(lineStart,lineEnd).map(p=>`<span class=hm-pixel style="left:${p.x}%;top:${p.y}%"></span>`).join("")}
function stageDown(e){hideMenu();if(e.target.dataset.id)return;stage.setPointerCapture&&stage.setPointerCapture(e.pointerId);let p=pt(e);if(tool=="line"){lineStart=p;lineEnd=p;drawPreview();return}panDrag={x:e.clientX,y:e.clientY,px:panX,py:panY,p,tool,moved:false}}
function stageMove(e){if(pinch)return;if(e.pointerType=="mouse"&&e.buttons===0&&(panDrag||drag||lineStart)){stageUp(e);return}if(panDrag){let dx=e.clientX-panDrag.x,dy=e.clientY-panDrag.y;if(Math.hypot(dx,dy)>3)panDrag.moved=true;if(panDrag.moved){panX=panDrag.px+dx;panY=panDrag.py+dy;applyView()}return}if(lineStart&&tool=="line"){lineEnd=pt(e);drawPreview();return}if(!drag)return;if(!drag.moved&&Math.hypot(e.clientX-drag.x,e.clientY-drag.y)>3){drag.moved=true;clearTimeout(pressTimer);hideMenu()}let p=pt(e);pixels.forEach(px=>{let o=drag.offsets&&drag.offsets[px.id];if(o){px.x=p.x-o.dx;px.y=p.y-o.dy}});draw()}
function stageUp(e){clearTimeout(pressTimer);if(panDrag){let pd=panDrag;panDrag=null;if(!pd.moved){if(pd.tool=="point")addPixel(pd.p.x,pd.p.y);else if(pd.tool=="select"){selected=[];draw()}}return}if(lineStart&&tool=="line"){let p=lineEnd||pt(e),dist=Math.hypot(p.x-lineStart.x,p.y-lineStart.y);if(dist>.25){let run="run-"+Date.now();linePoints(lineStart,p).forEach(q=>addPixel(q.x,q.y,run,true));selected=pixels.filter(x=>x.run==run).map(x=>x.id)}lineStart=null;clearPreview();draw()}drag=null}
function touchPoint(e){return{x:e.clientX,y:e.clientY}}
function pinchInfo(){let pts=[...touches.values()];if(pts.length<2)return null;let a=pts[0],b=pts[1],dx=b.x-a.x,dy=b.y-a.y;return{dist:Math.hypot(dx,dy),cx:(a.x+b.x)/2,cy:(a.y+b.y)/2}}
function pointerDown(e){if(e.pointerType=="touch"){touches.set(e.pointerId,touchPoint(e));if(touches.size==2){clearTimeout(pressTimer);panDrag=null;drag=null;lineStart=null;clearPreview();let p=pinchInfo();pinch={dist:p.dist,zoom};return}}stageDown(e)}
function pointerMove(e){if(e.pointerType=="touch"&&touches.has(e.pointerId)){touches.set(e.pointerId,touchPoint(e));if(pinch&&touches.size>=2){let p=pinchInfo();if(p&&pinch.dist>0){let r=stage.getBoundingClientRect();setZoom(pinch.zoom*100*(p.dist/pinch.dist),p.cx-r.left,p.cy-r.top)}return}}stageMove(e)}
function pointerUp(e){if(e.pointerType=="touch"){touches.delete(e.pointerId);if(pinch){pinch=null;panDrag=null;drag=null;lineStart=null;clearPreview();return}}stageUp(e)}
function addPixel(x,y,run,quiet){pixels.push({id:nextId(),x,y,out:currentOutput,run:run||"single-"+Date.now(),seg:null,color:"#ffd166"});if(!quiet)selected=[pixels[pixels.length-1].id];draw()}
function pixelDown(e,id){e.stopPropagation();menuPixel=id;if(e.button==2)return;let p=pt(e), runIds=idsForRun(id);if(e.shiftKey){let add=!runIds.every(x=>selected.includes(x));selected=add?[...new Set(selected.concat(runIds))]:selected.filter(x=>!runIds.includes(x));drag=null;clearTimeout(pressTimer);draw();return}if(e.ctrlKey||e.metaKey){selected=selected.includes(id)?selected.filter(x=>x!=id):selected.concat(id);drag=null;clearTimeout(pressTimer);draw();return}else selected=runIds;let ids=selected.includes(id)?selected:[id],offsets={};pixels.forEach(px=>{if(ids.includes(px.id))offsets[px.id]={dx:p.x-px.x,dy:p.y-px.y}});drag={id,offsets,x:e.clientX,y:e.clientY,moved:false};pressTimer=setTimeout(()=>{if(drag&&!drag.moved)showMenu(e.clientX,e.clientY,id)},550);draw()}
function showMenu(x,y,id){menuPixel=id;if(!selected.includes(id))selected=idsForRun(id);let m=gId("menu");m.style.left=x+"px";m.style.top=y+"px";m.classList.remove("hm-hidden");draw()}
function hideMenu(){gId("menu").classList.add("hm-hidden")}
function draw(){pxWrap.innerHTML="";wires.innerHTML="";pixels.sort((a,b)=>a.id-b.id).forEach((p,i)=>{if(i){let q=pixels[i-1];if((q.out||0)==(p.out||0)){let l=document.createElementNS("http://www.w3.org/2000/svg","line");l.dataset.to=p.id;l.setAttribute("x1",q.x+"%");l.setAttribute("y1",q.y+"%");l.setAttribute("x2",p.x+"%");l.setAttribute("y2",p.y+"%");l.setAttribute("stroke",liveColor(p.id,"rgba(255,255,255,.42)"));wires.appendChild(l)}}let b=document.createElement("span");b.className="hm-pixel"+(selected.includes(p.id)?" sel":"");b.dataset.id=p.id;b.role="button";b.tabIndex=0;b.style.left=p.x+"%";b.style.top=p.y+"%";b.style.setProperty("--c",liveColor(p.id,p.color||"#ffd166"));b.title="Pixel "+p.id+" - Output "+((p.out||0)+1)+(p.run&&p.run.startsWith("run-")?" (line)":"");b.onpointerdown=e=>pixelDown(e,p.id);b.oncontextmenu=e=>{e.preventDefault();showMenu(e.clientX,e.clientY,p.id)};pxWrap.appendChild(b)});drawCount();drawSegments()}
function totalPixels(){return outputs.reduce((n,o)=>n+(o.len||0),0)||((info.leds&&info.leds.count)||0)}
function drawCount(){let total=totalPixels(),used=pixels.length,box=gId("countBox");gId("pixelCount").textContent=used+" / "+(total||"?");box.className="hm-count "+(total&&used>total?"over":total&&used==total?"ok":"warn");gId("outputCounts").innerHTML=outputs.map(o=>{let u=pixels.filter(p=>(p.out||0)==o.id).length,cls=o.len&&u>o.len?"over":o.len&&u==o.len?"ok":"";return `<div class="hm-output-count ${cls}"><b>${o.name}</b><span>${u} / ${o.len||"?"}</span></div>`}).join("")}
function compressIds(ids){ids=[...new Set(ids)].sort((a,b)=>a-b);let ranges=[],start=ids[0],prev=ids[0];for(let i=1;i<=ids.length;i++){if(ids[i]!==prev+1){ranges.push({start,stop:prev+1});start=ids[i]}prev=ids[i]}return ranges}
function segNodes(s){return s.nodes||Array.from({length:Math.max(0,(s.stop||0)-(s.start||0))},(_,i)=>(s.start||0)+i)}
function drawSegments(){gId("segments").innerHTML=segments.map((s,i)=>{let nodes=segNodes(s);return `<div class="hm-seg${activeSegment==i?" active":""}" onclick="selectSegment(${i})"><b>${s.name}</b><span>${nodes.length} px</span><span>${compressIds(nodes).length} range${compressIds(nodes).length==1?"":"s"}</span></div>`}).join("")}
function clearSelection(){selected=[];draw()}
function deleteSelected(){let del=[...selected];if(menuPixel!=null)del=[...new Set(del.concat(idsForRun(menuPixel)))];let runs=[...new Set(pixels.filter(p=>del.includes(p.id)&&p.run&&p.run.startsWith("run-")).map(p=>p.run))];pixels=pixels.filter(p=>!del.includes(p.id)&&!runs.includes(p.run));selected=[];hideMenu();renumberPixels();draw()}
function selectRun(){let p=pixels.find(x=>x.id==menuPixel);if(p)selected=pixels.filter(x=>x.run==p.run).map(x=>x.id);hideMenu();draw()}
function setRunStart(){if(menuPixel==null)return;let ids=orderedIdsFrom(menuPixel),old=Math.min(...ids),v=prompt("Start pixel number",old);if(v==null)return;let n=parseInt(v,10);if(isNaN(n)){msg.textContent="Enter a pixel number.";return}reorderIds(ids,n);hideMenu();draw();msg.textContent="Line starts at pixel "+Math.max(0,Math.min(n,pixels.length-ids.length))+" from the dot you picked."}
function reverseRun(){if(menuPixel==null)return;let ids=idsForRun(menuPixel).sort((a,b)=>a-b).reverse(),start=Math.min(...ids);reorderIds(ids,start);hideMenu();draw();msg.textContent="Line direction reversed."}
function selectSegment(i){if(!segments[i])return;activeSegment=i;selected=segNodes(segments[i]);draw();msg.textContent="Selected segment "+segments[i].name+"."}
function deleteSegment(){if(activeSegment==null||!segments[activeSegment]){msg.textContent="Select a segment to delete first.";return}let name=segments[activeSegment].name;segments.splice(activeSegment,1);activeSegment=null;selected=[];draw();msg.textContent="Deleted segment "+name+"."}
function makeSegment(){if(!selected.length&&menuPixel!=null)selected=[menuPixel];if(!selected.length){msg.textContent="Select pixels first.";return}let color="#ffd166",name=gId("segName").value||"House segment",ids=[...selected].sort((a,b)=>a-b);selected.forEach(id=>{let p=pixels.find(x=>x.id==id);if(p)p.color=color});segments.push({name,color,nodes:ids});activeSegment=segments.length-1;hideMenu();draw();msg.textContent="Created one segment with "+ids.length+" selected pixel"+(ids.length==1?".":"s.")}
async function applySegments(){if(!segments.length)makeSegment();let expanded=[];segments.forEach(s=>compressIds(segNodes(s)).forEach((r,i)=>expanded.push({name:compressIds(segNodes(s)).length>1?s.name+" "+(i+1):s.name,color:s.color,start:r.start,stop:r.stop})));let seg=expanded.slice(0,info.leds.maxseg||32).map((s,id)=>({id,n:s.name,start:s.start,stop:s.stop,col:[rgb(s.color)],on:true}));let r=await fetch(getURL("/json/state"),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({seg})});msg.textContent=r.ok?"Segments sent to WLED. Non-contiguous mapper segments are sent as WLED ranges.":"Could not send segments."}
function showBg(src){bg.onload=updatePictureRect;bg.onerror=()=>{let data=localStorage.getItem("hm-bg-data");if(data&&bg.src!=data){bg.src=data}else updatePictureRect()};bg.src=src;bg.classList.remove("hm-hidden");stage.classList.remove("empty");gId("empty").classList.add("hm-hidden")}
async function uploadPhoto(file){if(!file)return;let ext=(file.name.split(".").pop()||"jpg").toLowerCase(),name="/housemap-bg."+ext;let fd=new FormData();fd.append("data",file,name);try{await fetch(getURL("/upload"),{method:"POST",body:fd});localStorage.setItem("hm-bg",name)}catch(e){}try{let rd=new FileReader();rd.onload=()=>localStorage.setItem("hm-bg-data",rd.result);rd.readAsDataURL(file)}catch(e){}showBg(URL.createObjectURL(file))}
async function saveLayout(){let data={pixels,segments,bg:localStorage.getItem("hm-bg")||"",currentOutput,view:{zoom,panX,panY}};localStorage.setItem("wled-housemap",JSON.stringify(data));let fd=new FormData();fd.append("data",new Blob([JSON.stringify(data)],{type:"application/json"}),"/housemap.json");try{await fetch(getURL("/upload"),{method:"POST",body:fd});msg.textContent="Layout saved."; }catch(e){msg.textContent="Layout saved in this browser."}}
async function loadLayout(){let data=null;try{let r=await fetch(getURL("/edit?func=edit&path=/housemap.json&cb="+Date.now()));if(r.ok)data=await r.json()}catch(e){}if(!data){try{data=JSON.parse(localStorage.getItem("wled-housemap")||"null")}catch(e){}}if(!data){msg.textContent="No saved layout found.";drawCount();return}pixels=(data.pixels||[]).map(p=>({...p,out:p.out||0}));segments=data.segments||[];activeSegment=null;currentOutput=data.currentOutput||0;if(gId("outputSel"))gId("outputSel").value=currentOutput;if(data.view){zoom=data.view.zoom||1;panX=data.view.panX||0;panY=data.view.panY||0;applyView()}if(data.bg)showBg(getURL(data.bg));else{let dataBg=localStorage.getItem("hm-bg-data");if(dataBg)showBg(dataBg);else updatePictureRect()}draw();msg.textContent="Layout loaded."}
stage.addEventListener("wheel",e=>{e.preventDefault();let r=stage.getBoundingClientRect();setZoom(zoom*100*(e.deltaY<0?1.12:.89),e.clientX-r.left,e.clientY-r.top)},{passive:false});
stage.addEventListener("dragstart",e=>e.preventDefault());
window.addEventListener("pointerup",stageUp);
window.addEventListener("pointercancel",stageUp);
window.addEventListener("blur",()=>{panDrag=null;drag=null;lineStart=null;clearPreview();clearTimeout(pressTimer)});
window.addEventListener("resize",updatePictureRect);
async function init(){updatePictureRect();try{info=await(await fetch(getURL("/json/info"))).json()}catch(e){}try{cfg=await(await fetch(getURL("/json/cfg"))).json()}catch(e){}buildOutputs();loadLayout();drawCount();setLive(true)}
getLoc();init();
</script>
